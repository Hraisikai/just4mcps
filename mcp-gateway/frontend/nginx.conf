server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy — strips the /api prefix before forwarding to the backend.
    # GATEWAY_UPSTREAM is injected at container start by docker-entrypoint.sh
    # (defaults to http://gateway:8000). In k8s this should be the backend
    # Service FQDN, e.g. http://mcp-gateway-backend:8000.
    location /api/ {
        proxy_pass ${GATEWAY_UPSTREAM}/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow long-lived SSE connections
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # index.html and env-config.js must never be cached — they reference
    # content-hashed asset filenames, so a stale copy means stale JS/CSS.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    location = /env-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Static assets with long cache
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — everything else serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
