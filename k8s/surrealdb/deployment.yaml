apiVersion: apps/v1
kind: Deployment
metadata:
  name: surrealdb
  namespace: mcp-platform
  labels:
    app: surrealdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: surrealdb
  strategy:
    type: Recreate  # RWO volume, can't have two pods mounting at once
  template:
    metadata:
      labels:
        app: surrealdb
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:latest
          args:
            - start
            - --log=info
            - --user=$(SURREAL_USER)
            - --pass=$(SURREAL_PASS)
            - surrealkv:///data/surreal.db
          ports:
            - containerPort: 8000
          env:
            - name: SURREAL_USER
              valueFrom:
                secretKeyRef:
                  name: surrealdb-secrets
                  key: username
            - name: SURREAL_PASS
              valueFrom:
                secretKeyRef:
                  name: surrealdb-secrets
                  key: password
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: surrealdb-data