# Copy this file to secrets.yaml and fill in your values.
# Do NOT commit secrets.yaml to version control.
#
# To generate a credential encryption key:
#   python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
apiVersion: v1
kind: Secret
metadata:
  name: mcp-proxy-secrets
  namespace: mcp-platform
type: Opaque
stringData:
  keycloak-client-secret: "CHANGE-ME"
  surreal-url: "ws://surrealdb:8000/rpc"
  surreal-user: "root"
  surreal-pass: "CHANGE-ME"
  credential-encryption-key: "CHANGE-ME"
